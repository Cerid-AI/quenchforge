name: release

# Fires on a vX.Y.Z tag push. Goreleaser builds, signs, notarizes, publishes
# the GitHub release artifacts, and updates the Homebrew formula in
# cerid-ai/homebrew-tap.
#
# Required repository secrets (set before pushing a real tag):
#   APPLE_DEVELOPER_ID_CERT_P12_B64   base64 of a Developer-ID-Application .p12
#   APPLE_DEVELOPER_ID_CERT_PASSWORD  .p12 passphrase
#   APPLE_NOTARY_API_KEY_ID           App Store Connect API Key ID
#   APPLE_NOTARY_API_KEY_ISSUER       App Store Connect API Key Issuer ID
#   APPLE_NOTARY_API_KEY_P8_B64       base64 of the App Store Connect .p8
#   HOMEBREW_TAP_GITHUB_TOKEN         PAT with `repo` scope on Cerid-AI/homebrew-tap
#
# Until those secrets land, snapshot releases work via:
#   gh workflow run release.yml -f snapshot=true
# (the snapshot path skips sign/notarize/publish).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Snapshot build (skip signing + publish)'
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: macos-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
        with:
          # Submodules deliberately NOT checked out. The Go release binaries
          # (quenchforge, quenchforge-preflight) are pure stdlib and don't
          # depend on llama.cpp / whisper.cpp / sd.cpp / bark.cpp content.
          # The patch series checks in `before:hooks` are not load-bearing
          # for the binary and were also causing CI to detect a "dirty" tree
          # when nested submodules (bark.cpp → encodec.cpp → ggml) didn't
          # round-trip cleanly through `submodules: recursive`. The release
          # builds the supervisor + CLI; downstream consumers build
          # llama-server / whisper-server / sd-server / bark-server
          # themselves via the build-*.sh scripts.
          submodules: false
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      # ------------------------------------------------------------------
      # Sign-related setup. Skipped under snapshot mode AND skipped when
      # the relevant secrets aren't configured (so the first tag push
      # without secrets still produces an unsigned dry-run instead of
      # failing hard).
      # ------------------------------------------------------------------
      - name: import code-signing cert
        if: github.event.inputs.snapshot != 'true' && env.APPLE_DEVELOPER_ID_CERT_P12_B64 != ''
        env:
          APPLE_DEVELOPER_ID_CERT_P12_B64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_B64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KC=$(mktemp -d)/quenchforge.keychain
          KC_PASS=$(openssl rand -base64 18)
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -t 3600 -l "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')

          CERT_PATH=$(mktemp).p12
          # Strip all whitespace from the base64 (pbcopy on macOS produces
          # line-wrapped output at 76 chars; some operators paste with
          # trailing newlines). Both BSD and GNU base64 handle wrapped
          # input but tr -d makes the decode unambiguous.
          printf '%s' "$APPLE_DEVELOPER_ID_CERT_P12_B64" | tr -d ' \n\r\t' | base64 -d > "$CERT_PATH"

          # Diagnostics before security import — fail fast with a useful
          # message if the secret was malformed. The previous version of
          # this step failed with the cryptic "SecKeychainItemImport:
          # Unknown format in import." which doesn't tell you whether
          # the secret was empty, wrapped, or corrupt.
          echo "decoded P12 size: $(wc -c <"$CERT_PATH") bytes"

          # Step 1: structural check (does it look like a PKCS#12 at all).
          # `openssl pkcs12 -info -nokeys -noout` reads the outer SEQUENCE
          # but doesn't validate the password. So it catches truncation
          # and "wrong file in secret" but not "wrong passphrase".
          if ! openssl pkcs12 -info -in "$CERT_PATH" \
                 -passin "pass:bogus-not-the-real-one" \
                 -nokeys -noout >/dev/null 2>&1 && \
             [ "$(head -c2 "$CERT_PATH" | xxd -p)" != "3082" ]; then
            echo "::error::APPLE_DEVELOPER_ID_CERT_P12_B64 didn't decode to a PKCS#12 at all."
            echo "Decoded $(wc -c <"$CERT_PATH") bytes; first 4 bytes: $(head -c4 "$CERT_PATH" | xxd -p)"
            echo "Expected first 2 bytes to be 3082 (DER SEQUENCE)."
            echo "Re-encode the .p12 with: base64 -i <p12> | tr -d '\\n' | pbcopy"
            exit 1
          fi

          # Step 2: passphrase check. `openssl pkcs12 -noout` (no -info,
          # no -nokeys) DOES try to decrypt the bag and triggers MAC
          # verification — so a wrong passphrase fails here with a clear
          # signal long before security import gives us its cryptic
          # message.
          if ! openssl pkcs12 -in "$CERT_PATH" \
                 -passin "pass:$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
                 -noout 2>/tmp/pkcs12-err.log; then
            echo "::error::APPLE_DEVELOPER_ID_CERT_PASSWORD does not match the .p12's passphrase."
            head -3 /tmp/pkcs12-err.log
            echo
            echo "To verify your passphrase locally before re-setting the secret:"
            echo "  openssl pkcs12 -in ~/quenchforge-signing/quenchforge-developer-id.p12 \\"
            echo "    -passin \"pass:WHAT_YOU_THINK_IT_IS\" -noout"
            echo "Returns 0 = passphrase matches; 1 with 'Mac verify error' = no match."
            exit 1
          fi

          security import "$CERT_PATH" \
            -k "$KC" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PASS" "$KC"
          echo "APPLE_DEVELOPER_ID_CERT_PATH=$CERT_PATH" >> "$GITHUB_ENV"

      - name: stage notarization API key
        if: github.event.inputs.snapshot != 'true' && env.APPLE_NOTARY_API_KEY_P8_B64 != ''
        env:
          APPLE_NOTARY_API_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_B64 }}
        run: |
          set -euo pipefail
          P8=$(mktemp).p8
          printf '%s' "$APPLE_NOTARY_API_KEY_P8_B64" | tr -d ' \n\r\t' | base64 -d > "$P8"
          # The .p8 starts with `-----BEGIN PRIVATE KEY-----` — verify.
          if ! head -1 "$P8" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::APPLE_NOTARY_API_KEY_P8_B64 did not decode to a PEM private key."
            echo "Decoded $(wc -c <"$P8") bytes; first line: $(head -1 "$P8" | head -c 40)"
            echo "Re-encode locally with: base64 -i AuthKey_*.p8 | tr -d '\\n' | pbcopy"
            exit 1
          fi
          echo "APPLE_NOTARY_API_KEY_PATH=$P8" >> "$GITHUB_ENV"

      - name: enable signing flag
        # Only flip GORELEASER_SIGNING=on when we actually have credentials
        # AND we're not in snapshot mode. Without this guard, a tag push to
        # a repo whose Apple Developer ID secrets haven't been configured
        # would fail goreleaser at the sign step. This way an unsigned
        # release-mode build still succeeds — the GitHub release gets
        # populated with the unsigned tarballs, which is useful as a
        # bootstrap until secrets land.
        if: |
          github.event.inputs.snapshot != 'true' &&
          env.APPLE_DEVELOPER_ID_CERT_P12_B64 != '' &&
          env.APPLE_NOTARY_API_KEY_P8_B64 != ''
        env:
          APPLE_DEVELOPER_ID_CERT_P12_B64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_B64 }}
          APPLE_NOTARY_API_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_B64 }}
        run: echo "GORELEASER_SIGNING=on" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # Actually run goreleaser.
      # ------------------------------------------------------------------
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >-
            release
            ${{ github.event.inputs.snapshot == 'true' && '--snapshot --skip=sign,publish,notarize' || '--clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_KEY_ISSUER: ${{ secrets.APPLE_NOTARY_API_KEY_ISSUER }}

      - name: upload snapshot artifacts
        if: github.event.inputs.snapshot == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quenchforge-snapshot
          path: |
            dist/**/quenchforge_*
            dist/**/checksums.txt
          retention-days: 14
