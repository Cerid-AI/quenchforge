name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'

# Cancel superseded runs on the same branch (saves CI minutes when several
# pushes land back-to-back). Canonical form per global GH Actions cost policy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin to whatever version setup-go installed; don't let the toolchain
  # auto-upgrade itself mid-build (which would risk go.mod drift across
  # runners and obscure version-dependent failures).
  GOTOOLCHAIN: local

jobs:
  # ------------------------------------------------------------------
  # Lint — go vet + gofmt + go mod tidy drift gate
  # ------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: gofmt -l (fail on unformatted files)
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted Go files found:"
            echo "$unformatted"
            echo
            gofmt -d cmd internal
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # NB: no `go mod tidy` drift gate yet. The MVP is stdlib-only so
      # there's nothing for tidy to manage; we'll add the gate when Olla
      # is vendored in v0.2 (or earlier when we pull in a real dep).

  # ------------------------------------------------------------------
  # Test — go test ./... on Linux (CPU-stub paths, no GPU work).
  # ------------------------------------------------------------------
  test-linux:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - run: go test ./... -race -timeout 5m -count=1

  # ------------------------------------------------------------------
  # Test — go test ./... on macOS arm64. Validates the darwin build
  # tags compile clean and the macOS-only paths exercise their stubs.
  # ------------------------------------------------------------------
  test-macos:
    needs: [lint]
    # macos runners cost 10× ubuntu — skip on dependabot PRs unless explicitly
    # labelled `dependabot-full-ci`. Per global GH Actions cost policy (Rule 6).
    if: >-
      github.actor != 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'dependabot-full-ci')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - run: go test ./... -race -timeout 5m -count=1

  # ------------------------------------------------------------------
  # Build matrix — make sure both target triples produce a binary.
  # We don't run them, just verify they link.
  # ------------------------------------------------------------------
  build-matrix:
    needs: [lint]
    # macos build matrix — gate on dependabot per Rule 6.
    if: >-
      github.actor != 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'dependabot-full-ci')
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - name: build (darwin/${{ matrix.goarch }})
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o /tmp/quenchforge-${{ matrix.goarch }} ./cmd/quenchforge
          go build -o /tmp/quenchforge-preflight-${{ matrix.goarch }} ./cmd/quenchforge-preflight
          file /tmp/quenchforge-${{ matrix.goarch }}
          file /tmp/quenchforge-preflight-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-darwin-${{ matrix.goarch }}
          path: |
            /tmp/quenchforge-${{ matrix.goarch }}
            /tmp/quenchforge-preflight-${{ matrix.goarch }}
          retention-days: 7

  # ------------------------------------------------------------------
  # AMD-GPU integration tests — runs on the self-hosted runner labelled
  # `amd-gpu` (currently mac-pro-2019-vega-ii). Spawns the patched
  # llama-server against the real Vega II, exercises
  # /v1/chat/completions through the gateway, asserts the output isn't
  # garbage tokens. See docs/SELF_HOSTED_RUNNER.md.
  #
  # `continue-on-error: true` because the runner is a single machine;
  # if it's offline (maintenance, OS update, hardware fault) the rest
  # of CI shouldn't block. The rebase-upstream workflow has its own
  # hard gate against this same test path.
  # ------------------------------------------------------------------
  amd-gpu-integration:
    needs: [lint]
    # Fork PRs MUST NOT trigger self-hosted runs (Rule 8). Also skip on
    # dependabot PRs unless `dependabot-full-ci` labelled (Rule 6).
    if: >-
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.actor != 'dependabot[bot]' ||
        contains(github.event.pull_request.labels.*.name, 'dependabot-full-ci'))
    runs-on: [self-hosted, amd-gpu]
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: build patched llama-server (if missing)
        run: |
          if [ ! -x llama.cpp/build-x86_64/bin/llama-server ] && [ ! -x llama.cpp/build-arm64/bin/llama-server ]; then
            bash scripts/apply-patches.sh
            bash scripts/build-llama.sh
          fi

      - name: integration test (amd_gpu tag)
        run: go test -tags=amd_gpu -timeout 5m -count=1 ./tests/integration/...
