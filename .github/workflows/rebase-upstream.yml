name: rebase-upstream

# Weekly + on-demand: pull the latest upstream for each patched submodule
# (llama.cpp, whisper.cpp, sd.cpp, bark.cpp), replay the patch series, and open
# a PR. Real hardware validation happens on the self-hosted [amd-gpu] runner
# (added in a follow-up PR) — until that runner is online the workflow opens
# the PR and tags it `needs-hw-verify`.

on:
  schedule:
    # why: weekly cadence is enough — upstream llama.cpp master moves quickly
    # but daily rebase PRs would drown the maintainer in review noise. Monday
    # 08:00 UTC lands the PR before US-morning review block.
    - cron: '0 8 * * 1'
  workflow_dispatch:

# Long-running rebase + PR open job. Cancel superseded scheduled+manual runs
# on the same ref so back-to-back dispatches don't both burn macos-latest
# minutes (Rule 1, global GH Actions cost policy).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: replay patch series via scripts/rebase-upstream.sh
        id: rebase
        run: |
          set +e
          bash scripts/rebase-upstream.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: open PR with rebased patches
        if: steps.rebase.outputs.exit_code == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(deps): rebase patch series onto upstream'
          branch: 'auto/rebase-upstream'
          title: 'chore(deps): rebase patch series onto upstream'
          body: |
            Automated weekly rebase of the patch series onto each submodule's
            upstream default branch (llama.cpp, whisper.cpp, sd.cpp, bark.cpp).

            Resolved cleanly with `git am -3`. The self-hosted `[amd-gpu]` runner
            should validate this PR before merge.
          labels: |
            deps
            needs-hw-verify

      - name: open conflict PR
        if: steps.rebase.outputs.exit_code != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(deps): WIP — upstream rebase conflict'
          branch: 'auto/rebase-conflict'
          title: 'WIP: upstream rebase conflict — manual resolution needed'
          body: |
            `scripts/rebase-upstream.sh` exited non-zero for at least one
            submodule. Manual hunk resolution required — see the affected
            submodule working tree(s) for unmerged paths. The script log names
            which submodule stopped and the `git am --continue` recovery steps.
          labels: |
            deps
            rebase-conflict
