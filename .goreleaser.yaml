# Quenchforge release configuration.
#
# Build matrix produces:
#   - per-arch macOS binaries (darwin/amd64 + darwin/arm64)
#   - a universal macOS binary (lipo of the two) for direct download
#   - per-arch Homebrew bottles + a single auto-generated formula update
#     in the homebrew tap repo
#
# Signing + notarization is gated behind the GORELEASER_SIGNING=on env
# var so dry-run snapshots (`goreleaser release --snapshot --clean`) don't
# fail when running outside CI without the Apple Developer ID artifacts.
# In the release.yml workflow the env-var is set and the API key materializes
# from `secrets.APPLE_NOTARY_API_KEY` via GitHub's secrets.
#
# Test locally with:
#     goreleaser release --snapshot --clean --skip=sign,publish,notarize

version: 2

project_name: quenchforge

before:
  hooks:
    # The patch series is validated in the ci.yml workflow (which DOES
    # check out submodules). The release workflow intentionally skips
    # submodule checkout — the Go release binaries are pure stdlib and
    # don't depend on submodule content — so we can't run the patch
    # check here without dirtying the tree.
    - go mod download

builds:
  - id: quenchforge
    main: ./cmd/quenchforge
    binary: quenchforge
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.BuildDate={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: quenchforge-preflight
    main: ./cmd/quenchforge-preflight
    binary: quenchforge-preflight
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    mod_timestamp: '{{ .CommitTimestamp }}'

universal_binaries:
  - id: quenchforge-universal
    name_template: quenchforge
    ids: [quenchforge]
    replace: false # keep per-arch builds available for the Homebrew bottle
  - id: quenchforge-preflight-universal
    name_template: quenchforge-preflight
    ids: [quenchforge-preflight]
    replace: false

archives:
  - id: tarball
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - NOTICE
      - README.md
      - SECURITY.md
      - patches/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore\(deps\):'
      - '^Merge'
  groups:
    - title: New features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Patches
      regexp: '^.*?patch(\(.+\))??!?:.+$'
      order: 2

# ---------------------------------------------------------------------------
# Code signing — gated on $GORELEASER_SIGNING=on
# ---------------------------------------------------------------------------
#
# Requires GitHub repository secrets:
#   APPLE_DEVELOPER_ID_CERT_P12_B64  base64-encoded .p12 (developer-ID-app cert)
#   APPLE_DEVELOPER_ID_CERT_PASSWORD passphrase for the .p12
#   APPLE_NOTARY_API_KEY_ID          App Store Connect API Key ID
#   APPLE_NOTARY_API_KEY_ISSUER      App Store Connect API Key Issuer ID
#   APPLE_NOTARY_API_KEY_P8_B64      base64-encoded .p8 from App Store Connect
#
# The release workflow imports the cert + p8 into a temporary keychain
# before invoking `goreleaser release`. See .github/workflows/release.yml.

notarize:
  macos:
    - enabled: '{{ isEnvSet "GORELEASER_SIGNING" }}'
      sign:
        certificate: '{{ .Env.APPLE_DEVELOPER_ID_CERT_PATH }}'
        password: '{{ .Env.APPLE_DEVELOPER_ID_CERT_PASSWORD }}'
      notarize:
        issuer_id: '{{ .Env.APPLE_NOTARY_API_KEY_ISSUER }}'
        key_id: '{{ .Env.APPLE_NOTARY_API_KEY_ID }}'
        key: '{{ .Env.APPLE_NOTARY_API_KEY_PATH }}'
        # wait: false — submit-and-go. Goreleaser fires each binary at
        # Apple's notary service and exits the step without polling for
        # the result. The submission ID is logged; acceptance is verified
        # post-release via `xcrun notarytool history --key ... --key-id
        # ... --issuer ...` from the maintainer's workstation.
        #
        # Why: with wait: true + 4 binaries (quenchforge +
        # quenchforge-preflight × amd64 + arm64), goreleaser polls Apple
        # every ~50s during the wait, which trips Apple's per-API-key
        # hourly rate limit (HTTP 429 RATE_LIMIT). v0.3.2 attempt 4 hit
        # the 10m deadline; attempt 5 with 30m timeout hit the 429
        # instead.
        #
        # Stapling is not applicable here — Apple only allows stapling
        # of .app / .dmg / .pkg, not raw Mach-O binaries. The cloud-based
        # Gatekeeper check at install time uses the binary's hash, so
        # whether goreleaser polled or not is immaterial to end-user
        # experience as long as Apple accepts the submission (which it
        # has — confirmed via submission ID 9fcec6a6-... from attempt 4).
        wait: false
        # timeout is moot when wait: false, but goreleaser may still use
        # it for the initial submit upload. Keep at 30m for headroom.
        timeout: 30m
      ids:
        - quenchforge
        - quenchforge-preflight

# ---------------------------------------------------------------------------
# Homebrew tap — auto-update Formula/quenchforge.rb in cerid-ai/homebrew-tap
# ---------------------------------------------------------------------------

brews:
  - name: quenchforge
    homepage: https://github.com/Cerid-AI/quenchforge
    # `brew audit --strict --new` constraints on the description:
    # 1. must start with a capital letter
    # 2. must be < 80 characters (homebrew/core convention)
    # 3. must NOT end with a full stop
    # The previous longer description tripped (1) clean but blew past
    # (2) at 115 chars and tripped (3) on the trailing period.
    description: Patched ggml inference for AMD-Mac (chat, embed, rerank, transcribe)
    license: Apache-2.0
    # Skip the tap formula update when:
    #   - the release is a prerelease (auto-skip alpha/rc tags), OR
    #   - HOMEBREW_TAP_GITHUB_TOKEN isn't configured (no PAT, no upload —
    #     prevents goreleaser from hitting api.github.com with empty creds
    #     and 401'ing the whole release).
    skip_upload: '{{ if or (eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "") (ne .Prerelease "") }}true{{ else }}false{{ end }}'
    repository:
      owner: Cerid-AI
      name: homebrew-tap
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    commit_author:
      name: quenchforge-release-bot
      email: maintainers@cerid-ai.com
    commit_msg_template: 'chore(formula): bump quenchforge to {{ .Tag }}'
    directory: Formula
    install: |
      bin.install "quenchforge"
      bin.install "quenchforge-preflight"
    # `brew audit --strict --new`: passing 0 to shell_output is redundant
    # (it's the default for "exit code = 0 is success"). Removing the
    # trailing , 0 keeps the auto-generated formula audit-clean.
    test: |
      output = shell_output("#{bin}/quenchforge version")
      assert_match "quenchforge", output
      assert_match "darwin", output
      preflight_out = shell_output("#{bin}/quenchforge-preflight 2>&1")
      assert_match "status=", preflight_out
    service: |
      run [opt_bin/"quenchforge", "serve"]
      keep_alive true
      log_path "#{var}/log/quenchforge/serve.log"
      error_log_path "#{var}/log/quenchforge/serve.err.log"
      working_dir var
      environment_variables QUENCHFORGE_LOG_DIR: "#{var}/log/quenchforge"
    extra_install: |
      (var/"log/quenchforge").mkpath

# ---------------------------------------------------------------------------
# Release publication
# ---------------------------------------------------------------------------

release:
  github:
    owner: Cerid-AI
    name: quenchforge
  name_template: '{{.Tag}}'
  draft: false
  prerelease: auto
  header: |
    ## Quenchforge {{ .Tag }}

    Local inference for **Mac + AMD discrete GPU**, behind Ollama- and OpenAI-compatible HTTP APIs.
    See [README](https://github.com/Cerid-AI/quenchforge#readme) for the hardware compatibility matrix.
  footer: |
    **Install via Homebrew tap (recommended):**
    ```sh
    brew install cerid-ai/tap/quenchforge
    brew services start quenchforge
    ```
    **Verify before installing:**
    ```sh
    curl -fsSL https://github.com/Cerid-AI/quenchforge/releases/download/{{ .Tag }}/quenchforge-preflight_{{ .Version }}_darwin_universal.tar.gz \
      | tar -xz -O quenchforge-preflight | sh
    ```
